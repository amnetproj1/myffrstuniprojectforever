<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی دوز میوه‌ای</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
        }
        .status {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #34495e;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: #34495e;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .board.crazy {
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        .board.crazy .cell {
            width: 80px;
            height: 80px;
        }
        .cell:hover {
            background-color: #ecf0f1;
        }
        .cell.taken {
            cursor: not-allowed;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .cheat-area {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <h1>تا وقتی بتونی دوز بازی کنی ، همه چیز خوبه !</h1>
    
    <div class="status" id="status">در حال آماده سازی...</div>

    <div class="board" id="board">
        <!-- Cells will be generated by JS -->
    </div>

    <div class="controls">
        <div class="cheat-area">
            <input type="checkbox" id="cheatMode">
            <label for="cheatMode">فعالسازی سی‌پی‌یو دیوانه (حالت 16 تایی)</label>
        </div>
        <button onclick="initGame()">شروع مجدد</button>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const cheatCheckbox = document.getElementById('cheatMode');
        
        const fruits = ['🍎', '🍊', '🍋', '🍉', '🍇', '🍓', '🍒', '🍍', '🥝', '🍑'];
        let playerFruit, cpuFruit;
        let board = [];
        let gameActive = true;
        let isCrazyMode = false;

        function initGame() {
            gameActive = true;
            isCrazyMode = cheatCheckbox.checked;
            board = Array(isCrazyMode ? 16 : 9).fill(null);
            
            // تعیین میوه ها به صورت تصادفی
            let shuffled = [...fruits].sort(() => 0.5 - Math.random());
            playerFruit = shuffled[0];
            cpuFruit = shuffled[1];

            statusElement.innerText = `نوبت شماست! شما: ${playerFruit} | حریف: ${cpuFruit}`;
            
            createBoard();
        }

        function createBoard() {
            boardElement.innerHTML = '';
            const size = isCrazyMode ? 4 : 3;
            
            if (isCrazyMode) {
                boardElement.classList.add('crazy');
            } else {
                boardElement.classList.remove('crazy');
            }

            for (let i = 0; i < board.length; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', handleCellClick);
                boardElement.appendChild(cell);
            }
        }

        function handleCellClick(e) {
            const index = parseInt(e.target.getAttribute('data-index'));

            if (board[index] !== null || !gameActive) return;

            makeMove(index, playerFruit);

            if (checkWin(playerFruit)) {
                statusElement.innerText = `تبریک! ${playerFruit} برنده شد!`;
                gameActive = false;
                return;
            }

            if (board.every(cell => cell !== null)) {
                statusElement.innerText = "مساوی شد!";
                gameActive = false;
                return;
            }

            statusElement.innerText = "نوبت حریف...";
            setTimeout(cpuMove, 500);
        }

        function makeMove(index, fruit) {
            board[index] = fruit;
            const cells = document.getElementsByClassName('cell');
            cells[index].innerText = fruit;
            cells[index].classList.add('taken');
        }

        function cpuMove() {
            if (!gameActive) return;

            let availableMoves = board.map((val, idx) => val === null ? idx : null).filter(val => val !== null);
            
            if (availableMoves.length === 0) return;

            let move;
            
            if (isCrazyMode) {
                // در حالت دیوانه، سی پی یو سعی میکند از خانه های مخفی (ردیف و ستون 4) استفاده کند
                const strategicMoves = availableMoves.filter(idx => idx >= 9 || (idx + 1) % 4 === 0);
                if (strategicMoves.length > 0) {
                    move = strategicMoves[Math.floor(Math.random() * strategicMoves.length)];
                } else {
                    move = availableMoves[Math.floor(Math.random() * availableMoves.length)];
                }
            } else {
                move = availableMoves[Math.floor(Math.random() * availableMoves.length)];
            }

            makeMove(move, cpuFruit);

            if (checkWin(cpuFruit)) {
                statusElement.innerText = isCrazyMode ? `سی‌پی‌یو دیوانه با تقلب پیروز شد! ${cpuFruit}` : `حریف (${cpuFruit}) برنده شد!`;
                gameActive = false;
            } else if (board.every(cell => cell !== null)) {
                statusElement.innerText = "مساوی شد!";
                gameActive = false;
            } else {
                statusElement.innerText = `نوبت شماست (${playerFruit})`;
            }
        }

        function checkWin(fruit) {
            const size = isCrazyMode ? 4 : 3;
            const winPatterns = [];

            // ردیف ها
            for (let i = 0; i < size; i++) {
                let row = [];
                for (let j = 0; j < size; j++) row.push(i * size + j);
                winPatterns.push(row);
            }

            // ستون ها
            for (let i = 0; i < size; i++) {
                let col = [];
                for (let j = 0; j < size; j++) col.push(i + j * size);
                winPatterns.push(col);
            }

            // قطرها
            let diag1 = [], diag2 = [];
            for (let i = 0; i < size; i++) {
                diag1.push(i * (size + 1));
                diag2.push((i + 1) * (size - 1));
            }
            winPatterns.push(diag1, diag2);

            return winPatterns.some(pattern => {
                return pattern.every(index => board[index] === fruit);
            });
        }

        // شروع اولیه بازی
        initGame();
    </script>
</body>
</html>
